<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha - Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Image Gallery</h1>
        <p>Click on any image to expand</p>
    </header>

    <main class="gallery-container">
        <div class="gallery-item"><img src="https://picsum.photos/600/400?random=1" alt="Scenic View 1"></div>
        <div class="gallery-item"><img src="https://picsum.photos/600/400?random=2" alt="Scenic View 2"></div>
        <div class="gallery-item"><img src="https://picsum.photos/600/400?random=3" alt="Scenic View 3"></div>
        <div class="gallery-item"><img src="https://picsum.photos/600/400?random=4" alt="Scenic View 4"></div>
        <div class="gallery-item"><img src="https://picsum.photos/600/400?random=5" alt="Scenic View 5"></div>
        <div class="gallery-item"><img src="https://picsum.photos/600/400?random=6" alt="Scenic View 6"></div>
    </main>

    <div id="lightbox" class="lightbox">
        <span class="close-btn">&times;</span>
        <button class="nav-btn prev-btn">&#10094;</button>
        <img class="lightbox-img" src="" alt="Expanded View">
        <button class="nav-btn next-btn">&#10095;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
